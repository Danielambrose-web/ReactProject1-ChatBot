<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input placeholder="send message" size="50" />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage({ message, Sender }) {
        //   const message = probs.message;
        //  const Sender = probs.Sender;
        // const {message, Sender}  = probs;

        /*    if ((Sender === "robot")) {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message }
            </div>
          ); 
       }*/
        return (
          <div>
            {Sender === "robot" && <img src="robot.png" width="50" />}
            {message}
            {Sender === "user" && <img src="user.png" width="50" />}
          </div>
        );
      }
      function App() {
        const messages = [
          {
            message: "hello chatbot",
            Sender: "user",
          },
          {
            message: "Hello! How can I help you?",
            Sender: "robot",
          },
          {
            message: "todays date",
            Sender: "user",
          },
          {
            message: "Today is March 28",
            Sender: "robot",
          },
          {
            message: "flip a coin",
            Sender: "user",
          },
        ];

       const chatMessageComponent = ChatMessage.map((chatmessage) => {
          return (
            <>
              <ChatMessage
                message={chatmessage.message}
                Sender={chatmessage.Sender}
              />
            </>
          );
        });

        return (
          <>
            <ChatInput />
   
            {chatMessageComponent}
    
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
