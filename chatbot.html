<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input placeholder="send message" size="50" />
           <button>Send</button>
          </>
        );
      }

      function ChatMessage({message, Sender}) {
      //   const message = probs.message;
      //  const Sender = probs.Sender;
          // const {message, Sender}  = probs;

   /*    if ((Sender === "robot")) {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message}
            </div>
          ); 
       }*/
        return (
          <div>
          { Sender === 'robot' && <img src="robot.png" width="50" />}
            {message}
            { Sender === 'user' && <img src="user.png" width="50" />}
          </div>
        );
      }
      const app = (
        <>
          <ChatInput />
          <ChatMessage message="hello" Sender='user'/>
          <ChatMessage message="Hello! How can I help you?" Sender="robot" />
          <ChatMessage message="todays date" Sender='user'/>
          <ChatMessage message="Today is March 28" Sender="robot" />
          <ChatMessage message="flip a coin" Sender='user'/>
          <ChatMessage message="Sure! You got heads" Sender="robot" />
        </>
      );

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
